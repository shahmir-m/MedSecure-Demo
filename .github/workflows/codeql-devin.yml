name: Dispatch CodeQL Findings to Devin

on:
  # Trigger after pushes to main (the built-in CodeQL default setup runs separately)
  push:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  dispatch-to-devin:
    name: Dispatch CodeQL Findings to Devin
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for CodeQL default setup to process alerts
        run: sleep 60

      - name: Fetch open CodeQL alerts and create Devin sessions
        env:
          GH_TOKEN: ${{ secrets.CODEQL_ALERTS_TOKEN }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          DEVIN_PLAYBOOK_ID: ${{ secrets.DEVIN_PLAYBOOK_ID }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Validate required secrets
          if [ -z "${GH_TOKEN:-}" ] || [ -z "${DEVIN_API_KEY:-}" ] || [ -z "${DEVIN_ORG_ID:-}" ]; then
            echo "::error::Missing required secrets. Configure CODEQL_ALERTS_TOKEN, DEVIN_API_KEY, and DEVIN_ORG_ID in repo settings."
            exit 1
          fi

          # Fetch open code scanning alerts with HTTP status + response type validation
          alerts=$(curl -s -f -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO_FULL_NAME}/code-scanning/alerts?state=open&per_page=100") || {
              echo "::error::GitHub API request failed. Check CODEQL_ALERTS_TOKEN permissions (needs security_events scope)."
              exit 1
            }

          if ! echo "$alerts" | jq -e 'type == "array"' > /dev/null 2>&1; then
            echo "::error::Unexpected API response (expected array): $alerts"
            exit 1
          fi

          # Filter to only alerts created in the last 10 minutes to avoid duplicate dispatches
          cutoff=$(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%SZ)
          recent_alerts=$(echo "$alerts" | jq -c --arg cutoff "$cutoff" '[.[] | select(.created_at > $cutoff)]')
          alert_count=$(echo "$recent_alerts" | jq 'length')
          total_open=$(echo "$alerts" | jq 'length')
          echo "Found ${total_open} total open alert(s), ${alert_count} new since ${cutoff}."

          if [ "$alert_count" -eq 0 ]; then
            echo "No new alerts to dispatch."
            exit 0
          fi

          # Process each new alert individually
          echo "$recent_alerts" | jq -c '.[]' | while read -r alert; do
            rule_id=$(echo "$alert" | jq -r '.rule.id')
            rule_desc=$(echo "$alert" | jq -r '.rule.description')
            severity=$(echo "$alert" | jq -r '.rule.security_severity_level // "n/a"')
            alert_number=$(echo "$alert" | jq -r '.number')
            file_path=$(echo "$alert" | jq -r '.most_recent_instance.location.path')
            start_line=$(echo "$alert" | jq -r '.most_recent_instance.location.start_line')
            end_line=$(echo "$alert" | jq -r '.most_recent_instance.location.end_line')
            message=$(echo "$alert" | jq -r '.most_recent_instance.message.text')
            html_url=$(echo "$alert" | jq -r '.html_url')
            cwe_ids=$(echo "$alert" | jq -r '[.rule.tags // [] | .[] | select(startswith("external/cwe/"))] | join(", ")')

            prompt="Fix CodeQL vulnerability in ${REPO_FULL_NAME}

          ## Alert Details
          - **CodeQL Rule**: ${rule_id}
          - **Description**: ${rule_desc}
          - **Severity**: ${severity}
          - **CWE**: ${cwe_ids}
          - **Alert URL**: ${html_url}

          ## Location
          - **File**: ${file_path}
          - **Lines**: ${start_line}-${end_line}

          ## Finding
          ${message}

          ## Instructions
          1. Clone the repo ${REPO_FULL_NAME}
          2. Create a new branch from main
          3. Make a minimal, surgical fix for ONLY this specific vulnerability in ${file_path} around lines ${start_line}-${end_line}
          4. Do NOT change any other files or fix any other issues
          5. Commit, push, and create a PR targeting main
          6. The PR title should reference the CodeQL rule: \"Fix ${rule_id}: ${rule_desc}\"
          7. Wait for CI to pass"

            echo "Creating Devin session for alert #${alert_number}: ${rule_id} in ${file_path}:${start_line}"

            session_http=$(curl -s -o /tmp/session_resp.json -w "%{http_code}" \
              -X POST "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions" \
              -H "Authorization: Bearer ${DEVIN_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg prompt "$prompt" \
                --arg playbook_id "${DEVIN_PLAYBOOK_ID:-}" \
                'if $playbook_id != "" then {prompt: $prompt, playbook_id: $playbook_id} else {prompt: $prompt} end')")

            if [ "$session_http" -eq 200 ]; then
              session_url=$(jq -r '.url // "unknown"' /tmp/session_resp.json)
              echo "  -> Devin session created: ${session_url}"
            else
              echo "::warning::Devin API returned HTTP ${session_http} for alert #${alert_number}"
              cat /tmp/session_resp.json
            fi
          done

          echo "All alerts dispatched to Devin."
